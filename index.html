<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTube Premium - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-discord { background: #5865F2; }
        .btn-discord:hover { background: #4752C4; }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full glass z-50 px-4 py-3 flex flex-wrap gap-4 items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="renderPage('home')">
            <div class="bg-red-600 p-2 rounded-xl"><i data-lucide="play" class="text-white w-4 h-4 fill-current"></i></div>
            <span class="text-xl font-bold tracking-tighter">NexTube</span>
        </div>
        
        <input type="text" id="search-bar" oninput="filterVideos()" placeholder="Cari video..." class="bg-black/30 border border-white/10 px-4 py-2 rounded-full w-full md:w-96 order-3 md:order-2 outline-none focus:border-red-500 transition-all text-sm">
        
        <div id="nav-actions" class="flex items-center gap-3 order-2 md:order-3">
            <!-- Auth & Community buttons injected here -->
        </div>
    </nav>

    <!-- Main Workspace -->
    <main id="app" class="pt-28 px-4 md:px-8 max-w-7xl mx-auto"></main>

    <script>
        let videos = JSON.parse(localStorage.getItem('nex_videos')) || [
            { id: 1, title: "UI Design Trend 2025", views: "2.1M", thumb: "https://images.unsplash.com/photo-1561070791-2526d30994b5?w=600&h=340&fit=crop" },
            { id: 2, title: "Mastering Tailwind CSS", views: "900K", thumb: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=600&h=340&fit=crop" }
        ];
        let user = JSON.parse(localStorage.getItem('nex_user'));

        function filterVideos() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = videos.filter(v => v.title.toLowerCase().includes(query));
            renderHome(filtered);
        }

        function renderNav() {
            const nav = document.getElementById('nav-actions');
            let content = `
                <a href="https://discord.gg/opencloud" target="_blank" class="bg-white/5 hover:bg-white/10 px-4 py-1.5 rounded-full text-xs font-semibold transition-all flex items-center gap-1.5">
                    <i data-lucide="users" class="w-3.5 h-3.5 text-cyan-400"></i> Gabung Server
                </a>
            `;
            if (user) {
                content += `
                    <button onclick="renderPage('upload')" class="bg-red-600 hover:bg-red-700 px-4 py-1.5 rounded-full text-xs font-semibold transition-all">Upload</button>
                    <div class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full">
                        <img src="${user.avatar}" class="w-6 h-6 rounded-full">
                        <span class="text-xs font-bold">${user.username}</span>
                    </div>
                    <button onclick="logout()" class="text-red-500 text-xs font-bold">Keluar</button>
                `;
            } else {
                content += `<button onclick="renderPage('login')" class="btn-discord px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2"><i data-lucide="discord" class="w-3.5 h-3.5"></i>Login Discord</button>`;
            }
            nav.innerHTML = content;
            lucide.createIcons();
        }

        function renderHome(list = videos) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <h1 class="text-2xl font-bold mb-6">Rekomendasi Video</h1>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${list.map(v => `
                        <div class="glass rounded-2xl p-3 hover-lift cursor-pointer" onclick="renderPage('watch', ${v.id})">
                            <img src="${v.thumb}" class="rounded-xl w-full h-40 object-cover mb-3">
                            <h3 class="font-bold text-sm">${v.title}</h3>
                        </div>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function renderPage(page, videoId = null) {
            const app = document.getElementById('app');
            renderNav();
            if (page === 'home') renderHome();
            else if (page === 'login') {
                app.innerHTML = `
                    <div class="max-w-md mx-auto glass p-8 rounded-2xl text-center">
                        <h2 class="text-xl font-bold mb-6">Login ke NexTube</h2>
                        <button onclick="loginDiscord()" class="btn-discord w-full py-3 rounded-lg font-bold flex items-center justify-center gap-2"><i data-lucide="discord"></i> Login dengan Discord</button>
                    </div>
                `;
            } else if (page === 'upload') {
                if(!user) return renderPage('login');
                app.innerHTML = `
                    <div class="max-w-lg mx-auto glass p-8 rounded-2xl">
                        <h2 class="text-xl font-bold mb-4">Upload Video Baru</h2>
                        <input id="up-title" class="w-full bg-black/30 border border-white/10 p-3 rounded-lg mb-3" placeholder="Judul Video">
                        <input id="up-thumb" class="w-full bg-black/30 border border-white/10 p-3 rounded-lg mb-4" placeholder="URL Thumbnail Gambar">
                        <button onclick="handleUpload()" class="w-full bg-red-600 py-3 rounded-lg font-bold">Publish Video</button>
                    </div>
                `;
            } else if (page === 'watch') {
                const v = videos.find(x => x.id === videoId);
                app.innerHTML = `
                    <div class="grid grid-cols-1 gap-6">
                        <div class="bg-black aspect-video rounded-2xl flex items-center justify-center border border-white/10">
                            <i data-lucide="play" class="w-12 h-12 text-white/20"></i>
                        </div>
                        <h1 class="text-2xl font-bold">${v.title}</h1>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function loginDiscord() {
            user = { username: "Rey_Slither", avatar: "https://ui-avatars.com/api/?name=Rey" };
            localStorage.setItem('nex_user', JSON.stringify(user));
            renderPage('home');
        }

        function logout() {
            localStorage.removeItem('nex_user');
            user = null;
            renderPage('home');
        }

        function handleUpload() {
            const title = document.getElementById('up-title').value;
            const thumb = document.getElementById('up-thumb').value;
            if(!title || !thumb) return alert("Harap isi semua kolom!");
            videos.push({ id: Date.now(), title, thumb });
            localStorage.setItem('nex_videos', JSON.stringify(videos));
            renderPage('home');
        }

        renderPage('home');
    </script>
</body>
</html>
