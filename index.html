<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTube Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen">
    <nav class="fixed top-0 w-full glass z-50 px-4 py-3 flex flex-wrap gap-4 items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="renderPage('home')">
            <div class="bg-red-600 p-2 rounded-xl"><i data-lucide="play" class="text-white w-4 h-4 fill-current"></i></div>
            <span class="text-xl font-bold tracking-tighter">NexTube</span>
        </div>
        <input type="text" id="search-bar" oninput="filterVideos()" placeholder="Cari video..." class="bg-black/30 border border-white/10 px-4 py-2 rounded-full w-full md:w-96 order-3 md:order-2 outline-none focus:border-red-500 transition-all text-sm">
        <div id="nav-actions" class="flex gap-3 order-2 md:order-3"></div>
    </nav>

    <main id="app" class="pt-28 px-4 md:px-8 max-w-7xl mx-auto">
    </main>

    <script>
        let videos = JSON.parse(localStorage.getItem('nex_videos')) || [
            { id: 1, title: "UI Design Trend 2025", views: "2.1M", thumb: "https://images.unsplash.com/photo-1561070791-2526d30994b5?w=600&h=340&fit=crop" },
            { id: 2, title: "Mastering Tailwind CSS", views: "900K", thumb: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=600&h=340&fit=crop" }
        ];
        let user = JSON.parse(localStorage.getItem('nex_user'));

        function filterVideos() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = videos.filter(v => v.title.toLowerCase().includes(query));
            renderHome(filtered);
        }

        function renderNav() {
            const nav = document.getElementById('nav-actions');
            if (user) {
                nav.innerHTML = `
                    <button onclick="renderPage('upload')" class="bg-white/5 hover:bg-white/10 px-4 py-1.5 rounded-full text-xs font-semibold transition-all">Upload</button>
                    <button onclick="logout()" class="bg-red-600/20 text-red-500 px-4 py-1.5 rounded-full text-xs font-semibold hover:bg-red-600/30">Keluar</button>
                `;
            } else {
                nav.innerHTML = `<button onclick="renderPage('login')" class="bg-blue-600 px-4 py-1.5 rounded-full text-xs font-semibold">Login</button>`;
            }
        }

        function renderHome(list = videos) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <h1 class="text-2xl font-bold mb-6">Rekomendasi</h1>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${list.map(v => `
                        <div class="glass rounded-2xl p-3 hover-lift cursor-pointer" onclick="renderPage('watch', ${v.id})">
                            <img src="${v.thumb}" class="rounded-xl w-full h-40 object-cover mb-3">
                            <h3 class="font-bold text-sm">${v.title}</h3>
                        </div>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function renderPage(page, videoId = null) {
            const app = document.getElementById('app');
            renderNav();
            if (page === 'home') renderHome();
            else if (page === 'login') {
                app.innerHTML = `<div class="max-w-md mx-auto glass p-8 rounded-2xl text-center"><h2 class="text-xl font-bold mb-4">Login</h2><input id="login-user" class="w-full bg-black/30 border border-white/10 p-3 rounded-lg mb-4" placeholder="Username"><button onclick="login()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Masuk</button></div>`;
            } else if (page === 'upload') {
                if(!user) return renderPage('login');
                app.innerHTML = `<div class="max-w-lg mx-auto glass p-8 rounded-2xl"><h2 class="text-xl font-bold mb-4">Upload</h2><input id="up-title" class="w-full bg-black/30 border border-white/10 p-3 rounded-lg mb-3" placeholder="Judul"><input id="up-thumb" class="w-full bg-black/30 border border-white/10 p-3 rounded-lg mb-4" placeholder="URL Gambar"><button onclick="handleUpload()" class="w-full bg-red-600 py-3 rounded-lg font-bold">Publish</button></div>`;
            } else if (page === 'watch') {
                const v = videos.find(x => x.id === videoId);
                app.innerHTML = `<div class="grid grid-cols-1 gap-6"><div class="bg-black aspect-video rounded-2xl flex items-center justify-center border border-white/10"><i data-lucide="play" class="w-12 h-12 text-white/20"></i></div><h1 class="text-2xl font-bold">${v.title}</h1></div>`;
            }
            lucide.createIcons();
        }

        function login() {
            user = { username: document.getElementById('login-user').value };
            localStorage.setItem('nex_user', JSON.stringify(user));
            renderPage('home');
        }

        function logout() {
            localStorage.removeItem('nex_user');
            user = null;
            renderPage('home');
        }

        function handleUpload() {
            const title = document.getElementById('up-title').value;
            const thumb = document.getElementById('up-thumb').value;
            videos.push({ id: Date.now(), title, thumb });
            localStorage.setItem('nex_videos', JSON.stringify(videos));
            renderPage('home');
        }

        renderPage('home');
    </script>
</body>
</html>
